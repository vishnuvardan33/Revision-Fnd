<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <h4>example table</h4>
    
    <table border="black">
        <caption>Example Table</caption>
        <thead>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>Retail</th>
                <th>Wholesale</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Product A</td>
                <td>$10.00</td>
                <td>$8.00</td>
            </tr>
            <tr>
                <td>Product B</td>
                <td>$15.00</td>
                <td>$12.00</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
